name = "y-stream-test"
main = "test/worker.ts"
compatibility_date = "2026-02-05"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "Y_STREAM_PROVIDER"
class_name = "TestProvider"

[[durable_objects.bindings]]
name = "Y_STREAM_SUBSCRIBER"
class_name = "TestSubscriber"

[[durable_objects.bindings]]
name = "Y_SQL_PROVIDER"
class_name = "TestSqlProvider"

[[durable_objects.bindings]]
name = "Y_SQL_SUBSCRIBER"
class_name = "TestSqlSubscriber"

[[durable_objects.bindings]]
name = "Y_NOTIFY_PROVIDER"
class_name = "TestNotifyProvider"

[[durable_objects.bindings]]
name = "Y_NOTIFY_RECEIVER"
class_name = "TestNotifyReceiver"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TestProvider", "TestSqlProvider"]
new_classes = ["TestSubscriber", "TestSqlSubscriber"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TestNotifyProvider"]
new_classes = ["TestNotifyReceiver"]

[[durable_objects.bindings]]
name = "Y_COMMIT_PROVIDER"
class_name = "TestCommitCountProvider"

[[durable_objects.bindings]]
name = "Y_DEBOUNCE_PROVIDER"
class_name = "TestDebounceNotifyProvider"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["TestCommitCountProvider", "TestDebounceNotifyProvider"]
